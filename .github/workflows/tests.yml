# Lightweight Linux tests. Runs on pull requests to main only — not on every
# feature-branch push — to stay within free GitHub Actions limits.
name: Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "gameplay-auto-editor/**"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gameplay-auto-editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python3 scripts/test_quality_trust.py
          python3 scripts/test_phase4_features.py
          python3 scripts/test_rollout_phases.py
          python3 scripts/test_caption_quality.py
