name: Cleanup Actions Logs
on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all workflow logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/actions/runs \
            --paginate \
            -q '.workflow_runs[].id' | while read -r run_id; do
            gh api \
              -X DELETE \
              "repos/${{ github.repository }}/actions/runs/${run_id}/logs" \
              || true
          done
