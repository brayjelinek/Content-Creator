# Windows desktop builds are expensive on free GitHub Actions (Windows minutes
# cost more than Linux). This workflow runs ONLY when you click "Run workflow"
# in the Actions tab — not on every push or merge.
name: Build desktop app

on:
  workflow_dispatch:
    inputs:
      note:
        description: Optional note for this build (shows in the run summary)
        required: false
        default: manual build

concurrency:
  group: desktop-build
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    defaults:
      run:
        working-directory: gameplay-auto-editor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg on Windows
        run: choco install ffmpeg -y
        working-directory: .

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build desktop app
        run: python build_desktop_app.py

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          commit_short=$(python -c "import json; print(json.load(open('build_info.json'))['commit_short'])")
          echo "name=Gameplay-Auto-Editor-Windows-${commit_short}" >> "$GITHUB_OUTPUT"
          echo "folder=Gameplay-Auto-Editor-${commit_short}" >> "$GITHUB_OUTPUT"

      - name: Upload desktop app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: gameplay-auto-editor/dist/
          if-no-files-found: error
          retention-days: 7
