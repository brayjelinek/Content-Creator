name: Build desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "cursor/**"
    paths:
      - "gameplay-auto-editor/**"
      - ".github/workflows/build-desktop-app.yml"

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    defaults:
      run:
        working-directory: gameplay-auto-editor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg on Windows
        run: choco install ffmpeg -y
        working-directory: .

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build desktop app
        run: python build_desktop_app.py

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          commit_short=$(python -c "import json; print(json.load(open('build_info.json'))['commit_short'])")
          echo "name=Gameplay-Auto-Editor-Windows-${commit_short}" >> "$GITHUB_OUTPUT"

      - name: Upload desktop app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: gameplay-auto-editor/dist/
